# Required metadata
sonar.projectKey=secure-bank-app
sonar.projectName=Secure Bank App
sonar.projectVersion=1.0

# Source configuration
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Language settings
sonar.php.version=7

# Exclusions — skip binary/vendor files
sonar.exclusions=**/*.zip,**/*.jar,**/*.class,**/vendor/**,**/node_modules/**

# Security settings: tag issues with OWASP and SANS standards
# These properties are applied globally in SonarQube Quality Profiles
# To enable OWASP Top 10 / CWE tagging, activate the built-in
# "Sonar way" security quality profile from Administration > Quality Profiles

# Quality Gate — fail when there are Critical/Blocker issues
# Set via SonarQube UI: Administration > Quality Gates > Sonar way

# Issue severity thresholds
sonar.issue.ignore.allfile=
sonar.coverage.exclusions=

# Links (optional, for SonarQube dashboard)
sonar.links.homepage=http://localhost:9000
sonar.links.scm=https://github.com/your-org/secure-bank-app
sonar.links.issue=https://github.com/your-org/secure-bank-app/issues
